version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: goalspot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: goalspot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ""
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment for Redis GUI (optional)
  # redis-commander:
  #   image: rediscommander/redis-commander:latest
  #   container_name: goalspot_redis_ui
  #   environment:
  #     REDIS_HOSTS: local:redis:6379
  #   ports:
  #     - '8081:8081'
  #   depends_on:
  #     - redis

volumes:
  postgres_data:
  redis_data:
